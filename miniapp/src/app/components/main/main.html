<div class="content-wrapper" appBlurOnOutsideTap>
  <div class="header">
    <button class="burger" type="button" aria-label="Открыть меню" (click)="toggleMenu()">
      ☰
    </button>
    @if (userData$ | async; as data) {
      <p class="session-info">
        Пациент:
        {{
          data.lastSelectedPatientNickname
            ? (data.lastSelectedPatientNickname.length > 15
                ? (data.lastSelectedPatientNickname | slice:0:12) + '...'
                : data.lastSelectedPatientNickname)
            : ' - '
        }}
      </p>
    }
  </div>

  <div class="menu-overlay" [class.open]="menuOpen" (click)="menuOpen = false"></div>

  <nav class="side-menu" [class.open]="menuOpen">
    <button type="button" (click)="goToDoctor()">Профиль врача</button>
    <button type="button" (click)="goToPatients()">Пациенты</button>
  </nav>

  <div class="content" (click)="menuOpen = false">
    <app-chat></app-chat>
  </div>
</div>
