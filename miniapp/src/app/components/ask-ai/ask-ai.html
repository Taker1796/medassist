<app-menu-shell
  [showHome]="true"
  title="Спросить у ИИ"
  backRoute="/app"
  [allowSpecializationEdit]="false"
  [specializationTitleOverride]="conversationSpecializationTitle"
>
  <div class="content">
    <div class="ask-ai-layout">
      <section class="chat-page-header">
        <div class="chat-page-copy">
          <h2>Общий ИИ-чат</h2>
          <p>Используйте его для быстрых клинических вопросов и гипотез вне контекста конкретного пациента.</p>
        </div>

        <button
          class="clear-chat-button"
          type="button"
          aria-label="Очистить чат"
          title="Очистить чат"
          (click)="clearChat()"
          [disabled]="isClearing"
        >
          <span class="clear-chat-icon" aria-hidden="true">🗑</span>
          <span>{{ isClearing ? 'Очистка...' : 'Очистить чат' }}</span>
        </button>
      </section>

      <section class="chat-surface">
        <app-chat [mode]="'general'"></app-chat>
      </section>
    </div>
  </div>
</app-menu-shell>
