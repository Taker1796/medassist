<app-menu-shell
  [showHome]="true"
  [title]="title"
  [backRoute]="backRoute"
  [allowSpecializationEdit]="false"
  [specializationTitleOverride]="conversationSpecializationTitle"
>
  <div class="content">
    <div class="consultation-layout">
      <section class="chat-page-header">
        <div class="chat-page-copy">
          <h2>{{ title }}</h2>
          <p>Рабочий чат по текущему пациенту с возможностью завершить прием после фиксации результата.</p>
        </div>

        <button
          class="complete-visit-button"
          type="button"
          aria-label="Завершить приём"
          title="Завершить приём"
          (click)="completeVisit()"
          [disabled]="isCompletingVisit"
        >
          <span class="complete-visit-icon" aria-hidden="true">✔️</span>
          <span>{{ isCompletingVisit ? 'Завершение...' : 'Завершить приём' }}</span>
        </button>
      </section>

      <section class="chat-surface">
        <app-chat [mode]="'patient'" [patientId]="patientId"></app-chat>
      </section>
    </div>
  </div>
</app-menu-shell>
