<div class="chat-wrapper" (click)="onDialogAreaInteraction($event)" (touchstart)="onDialogAreaInteraction($event)">
  <div
    class="messages"
    #messagesContainer
    aria-live="polite"
    aria-label="История диалога"
    (scroll)="onScroll()"
  >

    @for (msg of messages; track msg.id) {
    <div
      class="message"
      [class.my-message]="msg.isMine"
      [class.bot-message]="!msg.isMine"
      [innerHTML]="formatMessage(msg.text)"
    >
    </div>
    }
    @if (isTyping) {
    <div class="typing-indicator" role="status" aria-live="polite">
      печатает...
    </div>
    }
  </div>

  <!-- Кнопка новых сообщений -->
  @if (showScrollButton) {
    <button
      class="scroll-bottom-btn"
      type="button"
      aria-label="Прокрутить к последнему сообщению"
      [class.show]="showScrollButton"
      (click)="scrollToBottom(true)"
    >
      ↓
    </button>
  }
  <div class="chat-input-container">
    <div class="input-wrapper">
      <div class="textarea-shell">
        <textarea
          #chatTextarea
          class="chat-textarea"
          [(ngModel)]="messageText"
          aria-label="Введите сообщение для нейросети"
          rows="1"
          (focus)="onTextareaFocus()"
          (input)="onInput($event)"
          (blur)="onTextareaBlur()"
          (keydown)="onKeyDown($event)"
        ></textarea>
        <span class="textarea-placeholder" [class.hidden]="messageText.trim().length > 0 || isTextareaFocused">
          Введите сообщение...
        </span>
      </div>

      <button
        class="send-button"
        type="button"
        aria-label="Отправить сообщение"
        (click)="sendMessage()"
        [disabled]="!messageText.trim()"
      >
        ➤
      </button>
    </div>
  </div>
</div>
